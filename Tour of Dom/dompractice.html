    <script>
        let amartitle=document.getElementById("heading")
        amartitle.innerText="Hello shihab kemon aso tmi"
       
        amartitle.innerHTML="Hello <b>Shihab</b>! DOM e swagotom!";
        // Text er color red korlam
        amartitle.style.background="red"
        amartitle.style.color="white"
        amartitle.style.fontSize = "50px";
        //button er kaj
        let button=document.getElementById("magicbtn")
        let text=document.getElementById("textCh")
        button.addEventListener("click", function() {
        // Keu button e click korlei ei vitorer code ta kaj korbe!
        text.innerText = "Boom! Jadu dekhecho?";
        text.style.color = "purple";
});
